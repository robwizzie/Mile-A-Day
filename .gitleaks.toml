# Mile A Day .gitleaks.toml — generated by cc-optimize for polyglot stack (TS + Swift).
# Includes default allowlists + JS/TS-specific paths + iOS-specific paths.

title = "Mile A Day gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Test fixtures and example data"
paths = [
  '''(.*?)/fixtures/(.*?)''',
  '''(.*?)/__mocks__/(.*?)''',
  '''(.*?)/mocks/(.*?)''',
  '''(.*?)/testdata/(.*?)''',
  '''docs/examples/(.*?)''',
  '''README(.*).md''',
  '''CHANGELOG(.*).md''',
  '''.env.example''',
  '''.env.sample''',
  '''.env.template''',
  '''SPLIT_TIMES_EXAMPLE\.md''',
  '''Mile-A-Day-Complete-APIs\.postman_collection\.json''',
]

[[allowlists]]
description = "JS/TS test files"
paths = [
  '''(.*?)\.test\.(ts|tsx|js|jsx|mjs|cjs)''',
  '''(.*?)\.spec\.(ts|tsx|js|jsx|mjs|cjs)''',
  '''(.*?)/__tests__/(.*?)''',
  '''(.*?)/e2e/(.*?)''',
]

[[allowlists]]
description = "iOS test/UI test targets"
paths = [
  '''app/Mile A DayTests/(.*?)''',
  '''app/Mile A DayUITests/(.*?)''',
  '''app/Mile A Day Watch Watch AppTests/(.*?)''',
  '''app/Mile A Day Watch Watch AppUITests/(.*?)''',
]

[[allowlists]]
description = "Build artifacts and lockfiles"
paths = [
  '''(.*?)/dist/(.*?)''',
  '''(.*?)/build/(.*?)''',
  '''(.*?)/\.next/(.*?)''',
  '''(.*?)/DerivedData/(.*?)''',
  '''(.*?)/node_modules/(.*?)''',
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''pnpm-lock\.yaml''',
]

[[allowlists]]
description = "Xcode project files (binary-ish, often tripping gitleaks)"
paths = [
  '''(.*?)\.xcodeproj/(.*?)''',
  '''(.*?)\.xcworkspace/(.*?)''',
  '''(.*?)\.xcuserstate''',
  '''(.*?)\.pbxproj''',
  '''(.*?)\.entitlements''',
  '''(.*?)-Info\.plist''',
]

[[allowlists]]
description = "Common safe placeholder values"
regexes = [
  '''(?i)example\.com''',
  '''(?i)mileaday\.run''',
  '''(?i)mad\.mindgoblin\.tech''',
  '''(?i)your[-_]api[-_]key[-_]here''',
  '''(?i)<your[-_].*?[-_]here>''',
  '''(?i)xxxx+''',
  '''(?i)changeme''',
  '''sk-test-(.*)''',
  '''pk_test_(.*)''',
  '''sk-ant-test-(.*)''',
]

[[allowlists]]
description = "PEM marker handling — pushNotificationService strips/re-adds PEM headers around a key loaded from APNS_KEY env var. The literal markers are not secrets."
paths = [
  '''backend/src/services/pushNotificationService\.ts''',
]

[[allowlists]]
description = "Env files (gitignored anyway, but safe to belt-and-suspenders)"
paths = [
  '''(.*?)\.env''',
  '''(.*?)\.env\.local''',
  '''(.*?)\.env\.production''',
  '''(.*?)\.env\.development''',
]
